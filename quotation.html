    <section id="registration">


        <form id="myForm">
            <h3>Register for more information</h3>
            <input type="text" placeholder="Name" name="name" id="name" required>
            <input type="email" placeholder="Email Address" name="email" id="email">
            <input type="tel" placeholder="Phone Number" name="phone" id="phone" pattern="[+]?[0-9]{8,15}" title="Please enter a valid phone number (8-15 digits)" required>
            <select id="product-select" name="Product Request" required>
                <option value="" disabled selected>Select a Product</option>
            </select>
            <input type="number" id="quantity" name="Quantity" placeholder="Quantity Needed" min="1" required>
            <input type="hidden" id="datetime" name="datetime">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_template" value="table">

            <button class="submit-btn" type="submit" href="index.html">Register</button>
        </form>



        </Div>





    </section>

    <section id="quote-history-section" style="display: none;">
        <div class="history-container">
            <h2>Your Quotation History</h2>
            <table id="history-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Product</th>
                        <th>Quantity</th>
                    </tr>
                </thead>
                <tbody id="history-tbody">
                    <!-- History rows will be inserted here -->
                </tbody>
            </table>
        </div>
    </section>












    <script>
        function showSidebar() {
            const sidebar = document.querySelector('.sidebar')
            sidebar.style.display = 'flex'
        }
        function hideSidebar() {
            const sidebar = document.querySelector('.sidebar')
            sidebar.style.display = 'none'
        }

        document.getElementById("myForm").addEventListener("submit", function (e) {
            e.preventDefault();

            const phoneInput = document.getElementById("phone").value;
            const quantityInput = document.getElementById("quantity").value;

            const phonePattern = /^[+]?[0-9]{8,15}$/;
            if (!phonePattern.test(phoneInput)) {
                alert("Please enter a valid phone number (8-15 digits).");
                return;
            }
            if (parseInt(quantityInput) < 1) {
                alert("Please enter a valid quantity (1 or more).");
                return;
            }

            const submitBtn = this.querySelector('.submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            const formData = new FormData(this);

            // Replace this URL with your new Google Apps Script URL if you deploy a new one.
            const scriptURL = "https://script.google.com/macros/s/AKfycbzvDo0iuyd3jjMCsSooktkXz6-ONdy9qtbrDLSP3K5Qa1aDGsjDkMFUSLgAlHzt5PLJ/exec";

            // Submit to Google Script
            fetch(scriptURL, {
                method: "POST",
                body: formData
            })
                .then(response => {
                    const emailValue = document.getElementById("email").value;
                    const productValue = document.getElementById("product-select").value;
                    const quantityValue = document.getElementById("quantity").value;
                    const dateValue = new Date().toLocaleDateString();
                    if (typeof addQuotationRecord === 'function') {
                        addQuotationRecord(emailValue, productValue, quantityValue, dateValue).then(() => {
                            if (typeof renderHistory === 'function') renderHistory();
                        });
                    }
                    alert("You are successfully registered and We will contact you shortly.");
                    this.reset();
                    // Set the datetime again since reset cleared it
                    const now = new Date();
                    const pad = (n) => (n < 10 ? '0' + n : n);
                    const localDatetime = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
                    document.getElementById("datetime").value = localDatetime;

                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Register';
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    alert("Something went wrong, please try again.");
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Register';
                });
        });


        async function renderHistory() {
            const currentUser = typeof getCurrentUser === 'function' ? getCurrentUser() : null;
            if (!currentUser) return;
            
            const historyObj = typeof getQuotationHistory === 'function' ? await getQuotationHistory() : [];
            const userHistory = historyObj.filter(h => h.email === currentUser.email);
            
            const historySection = document.getElementById("quote-history-section");
            const tbody = document.getElementById("history-tbody");
            
            if (userHistory.length > 0) {
                historySection.style.display = 'block';
                tbody.innerHTML = '';
                userHistory.forEach(h => {
                    const tr = document.createElement("tr");
                    tr.innerHTML = `<td>${h.date}</td><td>${h.product}</td><td>${h.quantity}</td>`;
                    tbody.appendChild(tr);
                });
            } else {
                historySection.style.display = 'block';
                tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; padding: 15px;">No previous quotation requests found.</td></tr>';
            }
        }

        window.onload = function () {
            const currentUser = typeof getCurrentUser === 'function' ? getCurrentUser() : null;
            if (currentUser) {
                const nameInput = document.getElementById("name");
                const emailInput = document.getElementById("email");
                if (nameInput) {
                    nameInput.value = currentUser.fullName || '';
                }
                if (emailInput) {
                    emailInput.value = currentUser.email || '';
                    emailInput.readOnly = true;
                    emailInput.style.backgroundColor = "#e9ecef";
                }
                
                // Render history slightly later to let auth.js load via <script src="auth.js">
                setTimeout(renderHistory, 150);
            }
            const now = new Date();
            const datetimeInput = document.getElementById("datetime");

            // Pad single digits with leading zero
            const pad = (n) => (n < 10 ? '0' + n : n);

            const year = now.getFullYear();
            const month = pad(now.getMonth() + 1); // Months are 0-based
            const day = pad(now.getDate());
            const hours = pad(now.getHours());
            const minutes = pad(now.getMinutes());

            // Format for datetime-local: YYYY-MM-DDTHH:MM
            const localDatetime = `${year}-${month}-${day}T${hours}:${minutes}`;

            datetimeInput.value = localDatetime;

            setTimeout(async () => {
                const productSelect = document.getElementById("product-select");
                if (typeof getCustomProducts === 'function' && productSelect) {
                    const products = await getCustomProducts();
                    products.forEach(p => {
                        const opt = document.createElement("option");
                        opt.value = p.name;
                        opt.textContent = p.name;
                        productSelect.appendChild(opt);
                    });
                }
            }, 100);
        };
